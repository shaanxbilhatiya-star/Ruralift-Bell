<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruralift — Production Room</title>
<link rel="manifest" href="/manifest-production.json">
<meta name="theme-color" content="#160B44">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  :root {
    --purple: #5E17EB;
    --navy: #160B44;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, var(--navy), #241259 60%, var(--purple));
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    text-align: center;
    padding: 20px;
    transition: background 0.3s ease;
  }
  body.ringing {
    animation: flash 0.6s ease-in-out infinite;
  }
  @keyframes flash {
    0%, 100% { background: linear-gradient(160deg, var(--navy), #241259 60%, var(--purple)); }
    50% { background: linear-gradient(160deg, var(--purple), #7a3ffb 60%, var(--navy)); }
  }
  .logo {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .sub {
    opacity: 0.75;
    font-size: 15px;
    margin-bottom: 50px;
  }
  .bellIcon {
    font-size: 110px;
    margin-bottom: 20px;
    transition: transform 0.15s ease;
  }
  .bellIcon.shake {
    animation: shake 0.4s ease infinite;
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }
  #msg {
    font-size: 22px;
    font-weight: 600;
    min-height: 30px;
  }
  #status {
    margin-top: 30px;
    font-size: 14px;
    opacity: 0.8;
  }
  #dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-right: 6px;
    background: #ff5555;
    vertical-align: middle;
  }
  #dot.connected { background: #4ade80; }
  #enableBtn {
    margin-top: 40px;
    padding: 14px 28px;
    font-size: 15px;
    border-radius: 30px;
    border: none;
    background: #fff;
    color: var(--navy);
    font-weight: 700;
    cursor: pointer;
  }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="logo">RURALIFT</div>
  <div class="sub">Production Room Display</div>

  <div class="bellIcon" id="bellIcon">🔕</div>
  <div id="msg">Waiting for calls...</div>

  <button id="enableBtn">Tap to Enable Sound</button>

  <div id="status"><span id="dot"></span><span id="statusText">Connecting...</span></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    const socket = io();
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const bellIcon = document.getElementById('bellIcon');
    const msg = document.getElementById('msg');
    const enableBtn = document.getElementById('enableBtn');
    const body = document.body;

    let audioCtx = null;
    let soundEnabled = false;

    enableBtn.addEventListener('click', () => {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // unlock audio with a silent blip
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      gain.gain.value = 0;
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.01);
      soundEnabled = true;
      enableBtn.classList.add('hidden');
      statusText.textContent = 'Sound enabled — waiting for calls...';
    });

    function playBell() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const master = audioCtx.createGain();
      master.gain.value = 0.9;
      master.connect(audioCtx.destination);

      // Real bells ring with inharmonic partials (not simple integer multiples).
      // These ratios approximate a small service/hand bell's overtone structure.
      const fundamental = 660; // E5-ish, bright "ding" pitch
      const partials = [
        { ratio: 1.00, gain: 1.00, decay: 2.2 },
        { ratio: 2.00, gain: 0.55, decay: 1.8 },
        { ratio: 2.76, gain: 0.35, decay: 1.4 },
        { ratio: 3.36, gain: 0.22, decay: 1.1 },
        { ratio: 4.10, gain: 0.14, decay: 0.9 },
        { ratio: 5.43, gain: 0.08, decay: 0.6 },
        { ratio: 0.50, gain: 0.30, decay: 2.6 } // sub "hum" tone gives body/warmth
      ];

      partials.forEach(p => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = fundamental * p.ratio;
        // tiny random detune per partial = natural shimmer, avoids robotic sound
        osc.detune.value = (Math.random() - 0.5) * 6;

        const peak = p.gain;
        gain.gain.setValueAtTime(0.0001, now);
        // fast sharp attack like a physical strike
        gain.gain.exponentialRampToValueAtTime(peak, now + 0.006);
        // natural exponential decay tail
        gain.gain.exponentialRampToValueAtTime(0.0001, now + p.decay);

        osc.connect(gain).connect(master);
        osc.start(now);
        osc.stop(now + p.decay + 0.1);
      });

      // Short noise burst at the very start = the "strike" transient (mallet hitting metal)
      const bufferSize = audioCtx.sampleRate * 0.02;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 2000;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.25;
      noise.connect(noiseFilter).connect(noiseGain).connect(master);
      noise.start(now);
    }

    function ringSequence() {
      // Ring 3 times, spaced out
      let count = 0;
      const maxRings = 3;
      body.classList.add('ringing');
      bellIcon.classList.add('shake');
      bellIcon.textContent = '🔔';
      msg.textContent = 'Reception is calling!';

      const interval = setInterval(() => {
        playBell();
        count++;
        if (count >= maxRings) {
          clearInterval(interval);
          setTimeout(() => {
            body.classList.remove('ringing');
            bellIcon.classList.remove('shake');
            bellIcon.textContent = '🔕';
            msg.textContent = 'Waiting for calls...';
          }, 1500);
        }
      }, 900);
      playBell(); // first ring immediately
    }

    socket.on('connect', () => {
      dot.classList.add('connected');
      statusText.textContent = soundEnabled ? 'Sound enabled — waiting for calls...' : 'Connected — tap to enable sound';
    });

    socket.on('disconnect', () => {
      dot.classList.remove('connected');
      statusText.textContent = 'Disconnected — reconnecting...';
    });

    socket.on('bell-ring', () => {
      ringSequence();
    });
  </script>
</body>
</html>
